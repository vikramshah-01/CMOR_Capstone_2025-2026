<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adjustable Parameter Inputs</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body class="three-column-layout">
    <h1>Adjustable Parameter Inputs</h1>
    <p>
      This page allows you to adjust physiological parameters manually. After
      changing the values, click Submit to visualize the resulting flows,
      pressures, saturations, and oxygen delivery.
    </p>

    <div class="flex-container">
      <!-- Left: image -->
      <div class="image-container">
        <img
          src="/static/Image.png"
          usemap="#image-map"
          alt="Patient Vitals Diagram"
          class="interactive-image"
          id="clickable-image"
        />

        <map name="image-map">
          <area
            target=""
            alt="Common Atrium"
            title="Common Atrium"
            href=""
            coords="1716,3373,286"
            shape="circle"
            data-content="Common Atrium: Mixing chamber where oxygenated and deoxygenated blood combine before entering the right ventricle."
          />
          <area
            target=""
            alt="Right Ventricle"
            title="Right Ventricle"
            href=""
            coords="1716,1799,280"
            shape="circle"
            data-content="Right Ventricle: Pumps blood from the heart into the arterial system."
          />
          <area
            target=""
            alt="Systemic Circulation"
            title="Systemic Circulation"
            href=""
            coords="238,1598,655,2000"
            shape="rect"
            data-content="Systemic Circulation: Delivers oxygen to the body and returns deoxygenated blood."
          />
          <area
            target=""
            alt="Pulmonary Circulation"
            title="Pulmonary Circulation"
            href=""
            coords="2786,1595,3207,1997"
            shape="rect"
            data-content="Pulmonary Circulation: Sends blood to the lungs for oxygenation and returns oxygen-rich blood."
          />
          <area
            target=""
            alt="Arterial Pressure"
            title="Arterial Pressure"
            href=""
            coords="1719,305,220"
            shape="circle"
            data-content="Arterial Pressure: Pressure driving blood flow through systemic and pulmonary circuits."
          />
          <area
            target=""
            alt="Systemic Flow"
            title="Systemic Flow"
            href=""
            coords="451,62,1497,458"
            shape="rect"
            data-content="Systemic Flow: Blood flow from the heart to the body tissues."
          />
          <area
            target=""
            alt="Pulmonary Flow"
            title="Pulmonary Flow"
            href=""
            coords="1954,63,2975,477"
            shape="rect"
            data-content="Pulmonary Flow: Blood flow from the heart to the lungs."
          />
          <area
            target=""
            alt="Right Ventricle Flow"
            title="Right Ventricle Flow"
            href=""
            coords="2082,1503,1402,586"
            shape="rect"
            data-content="Right Ventricle Flow: Output flow generated by the right ventricle."
          />
          <area
            target=""
            alt="Mixed Saturation"
            title="Mixed Saturation"
            href=""
            coords="1265,2115,2247,3073"
            shape="rect"
            data-content="Mixed Saturation: Oxygen level of blood after mixing in the atrium."
          />
          <area
            target=""
            alt="Oxygen Saturation in Systemic Vein"
            title="Oxygen Saturation in Systemic Vein"
            href=""
            coords="79,2053,1235,3519"
            shape="rect"
            data-content="Oxygen Saturation in Systemic Vein: Oxygen level of blood returning from the body (low)."
          />
          <area
            target=""
            alt="Oxygen Saturation in Pulmonary Vein"
            title="Oxygen Saturation in Pulmonary Vein"
            href=""
            coords="2259,3469,3387,2018"
            shape="rect"
            data-content="Oxygen Saturation in Pulmonary Vein: Oxygen level of blood returning from the lungs (high)."
          />
          <area
            target=""
            alt="Oxygen Saturation in Systemic Artery"
            title="Oxygen Saturation in Systemic Artery"
            href=""
            coords="55,484,841,1582"
            shape="rect"
            data-content="Oxygen Saturation in Systemic Artery: Oxygen level of blood delivered to the body."
          />
          <area
            target=""
            alt="Oxygen Saturation in Pulmonary Artery"
            title="Oxygen Saturation in Pulmonary Artery"
            href=""
            coords="2677,496,3384,1579"
            shape="rect"
            data-content="Oxygen Saturation in Pulmonary Artery: Oxygen level of blood going to the lungs."
          />
        </map>
      </div>

      <!-- Middle: inputs -->
      <div class="middle-column">
        <div class="card">
          <h2>Adjust Parameters</h2>

          <form id="parameterForm">
            <label for="HR">Heart Rate (beats/min):</label>
            <input
              type="number"
              id="HR"
              name="HR"
              min="50"
              max="180"
              step="1"
              value="140"
              required
            />
            <br /><br />

            <label for="C_dia">Diastolic Compliance (mL/mmHg):</label>
            <input
              type="number"
              id="C_dia"
              name="C_dia"
              min="0.1"
              max="8"
              step="0.1"
              value="6"
              required
            />
            <br /><br />

            <label for="C_sys">Systolic Compliance (mL/mmHg):</label>
            <input
              type="number"
              id="C_sys"
              name="C_sys"
              min="0.1"
              max="8"
              step="0.1"
              value="1.4"
              required
            />
            <br /><br />

            <label for="C_A">Arterial Compliance (mL/mmHg):</label>
            <input
              type="number"
              id="C_A"
              name="C_A"
              min="0.1"
              max="8"
              step="0.1"
              value="1.4"
              required
            />
            <br /><br />

            <label for="C_V">Venous Compliance (mL/mmHg):</label>
            <input
              type="number"
              id="C_V"
              name="C_V"
              min="0.1"
              max="8"
              step="0.1"
              value="6"
              required
            />
            <br /><br />

            <label for="R_p">Pulmonary Resistance (Wood Units x m^2):</label>
            <input
              type="number"
              id="R_p"
              name="R_p"
              min="0.01"
              max="1"
              step="0.01"
              value="0.34"
              required
            />
            <br /><br />

            <label for="R_s">Systemic Resistance (Wood Units x m^2):</label>
            <input
              type="number"
              id="R_s"
              name="R_s"
              min="0.01"
              max="15"
              step="0.01"
              value="7.74"
              required
            />
            <br /><br />

            <label for="V_total">Total Blood Volume (mL):</label>
            <input
              type="number"
              id="V_total"
              name="V_total"
              min="200"
              max="600"
              step="1"
              value="420"
              required
            />
            <br /><br />

            <label for="Hb">Hemoglobin Concentration (mg/ml):</label>
            <input
              type="number"
              id="Hb"
              name="Hb"
              min="0"
              max="30"
              step="1"
              value="15"
              required
            />
            <br /><br />

            <label for="CVO2">Total Oxygen Concentration (mg/min/m^2):</label>
            <input
              type="number"
              id="CVO2"
              name="CVO2"
              min="0"
              max="300"
              step="1"
              value="150"
              required
            />
            <br /><br />

            <div
              class="action-buttons"
              style="margin-top: 20px; text-align: center"
            >
              <button type="submit">Submit</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Right: results -->
      <div class="right-column">
        <p id="result"></p>
        <div id="sliderResults"></div>
      </div>
    </div>

    <!-- Diagram popup -->
    <div id="popup-modal" class="modal" style="display: none">
      <div class="modal-content">
        <span id="diagram-close" class="close">&times;</span>
        <p id="diagram-text"></p>
      </div>
    </div>

    <div style="text-align: center; margin-top: 30px">
      <a href="/"><button type="button">Back to Home</button></a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
